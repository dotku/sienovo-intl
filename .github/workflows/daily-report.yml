name: Daily Report

on:
  schedule:
    # 05:00 UTC (13:00 Beijing time) — after sync (02:00) and translate (03-04) complete
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate and send daily report
        env:
          GH_TOKEN: ${{ github.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/gen-report.mjs --period daily --send
