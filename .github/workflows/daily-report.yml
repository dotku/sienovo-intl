name: Daily Report

on:
  schedule:
    # 05:00 UTC (13:00 Beijing time) — after sync (02:00) and translate (03-04) complete
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gather metrics
        id: m
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          SINCE=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          TODAY=$(date -u +%Y-%m-%d)

          TRANSLATED=$(git log --since="$SINCE" --pretty=%s -- content/blog-en/ \
            | awk '/^translate: add [0-9]+/ {sum+=$3} END {print sum+0}')

          SYNCED=$(git log --since="$SINCE" --pretty=%s -- content/blog/ \
            | awk '/^sync: fetch [0-9]+/ {sum+=$3} END {print sum+0}')

          BLOG=$(find content/blog -name '*.mdx' | wc -l | tr -d ' ')
          BLOG_EN=$(find content/blog-en -name '*.mdx' | wc -l | tr -d ' ')
          REMAINING=$((BLOG - BLOG_EN))

          SYNC_RUN=$(gh run list --workflow=sync-blog.yml --limit 1 --json conclusion,url --jq '.[0]')
          TRANSLATE_RUN=$(gh run list --workflow=translate-blog.yml --limit 1 --json conclusion,url --jq '.[0]')

          {
            echo "today=$TODAY"
            echo "synced=$SYNCED"
            echo "translated=$TRANSLATED"
            echo "blog=$BLOG"
            echo "blog_en=$BLOG_EN"
            echo "remaining=$REMAINING"
            echo "sync_status=$(echo "$SYNC_RUN" | jq -r '.conclusion // "no-run"')"
            echo "sync_url=$(echo "$SYNC_RUN" | jq -r '.url // ""')"
            echo "translate_status=$(echo "$TRANSLATE_RUN" | jq -r '.conclusion // "no-run"')"
            echo "translate_url=$(echo "$TRANSLATE_RUN" | jq -r '.url // ""')"
          } >> "$GITHUB_OUTPUT"

      - name: Send report via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TODAY: ${{ steps.m.outputs.today }}
          SYNCED: ${{ steps.m.outputs.synced }}
          TRANSLATED: ${{ steps.m.outputs.translated }}
          BLOG: ${{ steps.m.outputs.blog }}
          BLOG_EN: ${{ steps.m.outputs.blog_en }}
          REMAINING: ${{ steps.m.outputs.remaining }}
          SYNC_STATUS: ${{ steps.m.outputs.sync_status }}
          SYNC_URL: ${{ steps.m.outputs.sync_url }}
          TRANSLATE_STATUS: ${{ steps.m.outputs.translate_status }}
          TRANSLATE_URL: ${{ steps.m.outputs.translate_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          icon() {
            case "$1" in
              success) echo "成功" ;;
              failure) echo "失败" ;;
              cancelled) echo "已取消" ;;
              no-run) echo "未运行" ;;
              *) echo "$1" ;;
            esac
          }

          SYNC_LABEL=$(icon "$SYNC_STATUS")
          TRANSLATE_LABEL=$(icon "$TRANSLATE_STATUS")

          HTML=$(cat <<EOF
          <div style="font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;max-width:600px;margin:0 auto;color:#0a0a0a">
            <h2 style="margin:0 0 4px">sienovo-intl 每日报告</h2>
            <p style="color:#666;margin:0 0 16px">${TODAY}（UTC）</p>
            <table cellpadding="8" style="border-collapse:collapse;width:100%;font-size:14px">
              <tr><td style="border-bottom:1px solid #eee">近 24 小时新抓取</td><td style="border-bottom:1px solid #eee;text-align:right"><b>${SYNCED}</b> 篇</td></tr>
              <tr><td style="border-bottom:1px solid #eee">近 24 小时翻译完成</td><td style="border-bottom:1px solid #eee;text-align:right"><b>${TRANSLATED}</b> 篇</td></tr>
              <tr><td style="border-bottom:1px solid #eee">总数（中 / 英）</td><td style="border-bottom:1px solid #eee;text-align:right">${BLOG} / ${BLOG_EN}</td></tr>
              <tr><td style="border-bottom:1px solid #eee">剩余待翻译</td><td style="border-bottom:1px solid #eee;text-align:right"><b>${REMAINING}</b> 篇</td></tr>
              <tr><td style="border-bottom:1px solid #eee">最新同步任务</td><td style="border-bottom:1px solid #eee;text-align:right"><a href="${SYNC_URL}">${SYNC_LABEL}</a></td></tr>
              <tr><td>最新翻译任务</td><td style="text-align:right"><a href="${TRANSLATE_URL}">${TRANSLATE_LABEL}</a></td></tr>
            </table>
            <p style="color:#999;font-size:12px;margin-top:24px">来自 <a href="https://github.com/${REPO}">${REPO}</a></p>
          </div>
          EOF
          )

          jq -n \
            --arg from "sienovo-intl <onboarding@resend.dev>" \
            --arg to "sienovojay@gmail.com" \
            --arg subject "[sienovo-intl] 每日报告 ${TODAY}" \
            --arg html "$HTML" \
            '{from: $from, to: [$to], subject: $subject, html: $html}' > /tmp/payload.json

          RESP=$(curl -s -w "\n%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json)

          CODE=$(printf '%s' "$RESP" | tail -n1)
          BODY=$(printf '%s' "$RESP" | sed '$d')

          echo "HTTP $CODE"
          echo "$BODY" | head -c 500
          echo ""

          if [ "$CODE" != "200" ]; then
            echo "::error::Resend returned HTTP $CODE"
            exit 1
          fi
