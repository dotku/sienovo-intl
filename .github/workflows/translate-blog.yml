name: Translate Blog

on:
  schedule:
    # Run daily at 3:00 AM UTC (11:00 AM CST), 1 hour after sync
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger
  workflow_run:
    # Also trigger after sync completes
    workflows: ["Sync CSDN Blog"]
    types: [completed]

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Try Gemini free first, fallback to Vercel AI Gateway
      # Automatically skips already-translated articles
      - name: Translate articles (Gemini free)
        run: node scripts/translate-blog.mjs --provider gemini
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Translate remaining (Vercel AI Gateway)
        run: node scripts/translate-blog.mjs --provider gateway
        continue-on-error: true
        env:
          VERCEL_AI_GEWAY_API_KEY: ${{ secrets.VERCEL_AI_GEWAY_API_KEY }}

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog-en/
          if git diff --staged --quiet; then
            echo "No new translations to commit."
          else
            COUNT=$(git diff --staged --name-only -- content/blog-en/ | wc -l | tr -d ' ')
            git commit -m "translate: add ${COUNT} English blog translations"
            git push
          fi
