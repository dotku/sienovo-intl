name: Translate Blog

on:
  schedule:
    # Run daily at 3:00 AM UTC (11:00 AM CST), 1 hour after sync
    - cron: "0 3 * * *"
  workflow_dispatch: # Allow manual trigger
  workflow_run:
    # Also trigger after sync completes
    workflows: ["Sync CSDN Blog"]
    types: [completed]

permissions:
  contents: write
  models: read     # enables the auto GITHUB_TOKEN to call models.github.ai

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Primary: Cerebras (Qwen-3-235B). Native Chinese, very fast
      # inference — clears a multi-hundred-article backlog in minutes.
      # If CEREBRAS_API_KEY is unset, this step is a no-op and the
      # subsequent Gemini step picks up the slack.
      - name: Translate articles (Cerebras Qwen-3-235B)
        run: node scripts/translate-blog.mjs --provider cerebras
        continue-on-error: true
        env:
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}

      # Fallback 1: Gemini 2.5 Flash free tier — 10 RPM, 250 RPD.
      # DELAY_MS=6500 in the script is already calibrated for its 10 RPM cap.
      - name: Translate remaining (Gemini free)
        run: node scripts/translate-blog.mjs --provider gemini
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Fallback 2: GitHub Models (gpt-4o-mini). Free tier via the
      # auto-injected GITHUB_TOKEN with `models: read` scope is only
      # 150 RPD — fine as a top-up after Gemini is exhausted.
      - name: Translate remaining (GitHub Models)
        run: node scripts/translate-blog.mjs --provider github-models
        continue-on-error: true
        env:
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN || github.token }}

      # Fallback 3: OpenRouter (paid credits, very generous rate limits).
      - name: Translate remaining (OpenRouter)
        run: node scripts/translate-blog.mjs --provider openrouter
        continue-on-error: true
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # Fallback 4: Vercel AI Gateway (paid credits). Secret name is the
      # legacy "VERCEL_AI_GEWAY_API_KEY" (sic — typo predates this fix).
      - name: Translate remaining (Vercel AI Gateway)
        run: node scripts/translate-blog.mjs --provider gateway
        continue-on-error: true
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.VERCEL_AI_GEWAY_API_KEY }}

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog-en/
          if git diff --staged --quiet; then
            echo "No new translations to commit."
            exit 0
          fi
          COUNT=$(git diff --staged --name-only -- content/blog-en/ | wc -l | tr -d ' ')
          git commit -m "translate: add ${COUNT} English blog translations"

          # Retry push with rebase — this workflow runs ~1h, so other
          # scheduled workflows (sync-blog, seo-daily, outreach-daily, etc.)
          # may have pushed to main in the meantime.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing on origin/main and retrying."
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "Push failed after 5 attempts." >&2
          exit 1
