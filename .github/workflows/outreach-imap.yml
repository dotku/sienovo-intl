name: Outreach IMAP reply scan

# Polls Collin's + Jay's mailboxes via IMAP every 2 hours during business
# hours and stamps OutreachEmail.repliedAt when an inbound message
# references one of our outbound emails via In-Reply-To / References
# headers (or the sender + Re: subject heuristic).
#
# Required secrets:
#   DATABASE_URL                     Neon Postgres (read+write)
#   IMAP_MAILBOXES                   JSON array of {host, port, user, pass, tls?}
#                                    e.g. [{"host":"imap.exmail.qq.com","port":993,
#                                            "user":"collin.liu@sienovo.cn","pass":"..."}]

on:
  schedule:
    # Every 2h between 14:00 UTC (07:00 PT / 22:00 Beijing) and
    # 02:00 UTC next day. Most reply traffic flows through US/EU
    # business-hours windows; mainland night-time scan is wasteful.
    - cron: "0 14,16,18,20,22,0,2 * * 1-5"
  workflow_dispatch:
    inputs:
      since:
        description: "Rescan window (e.g. '24h', '7d', or '2026-05-01')"
        required: false
        default: "24h"
      dry_run:
        description: "Dry-run (no DB write)?"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    concurrency:
      # Don't double-poll, racing the dedup index in the script
      group: outreach-imap
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm i --no-fund --no-audit

      - name: Poll IMAP for replies
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAP_MAILBOXES: ${{ secrets.IMAP_MAILBOXES }}
        run: |
          SINCE="${{ github.event.inputs.since || '24h' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY" = "true" ]; then
            node scripts/outreach-imap-poll.mjs --since "$SINCE" --dry-run
          else
            node scripts/outreach-imap-poll.mjs --since "$SINCE"
          fi
