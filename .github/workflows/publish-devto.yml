name: Publish to Dev.to

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max articles to publish in this run"
        required: false
        default: "3"
      draft:
        description: "Publish as draft (true/false)"
        required: false
        default: "false"
  schedule:
    # 06:00 UTC daily (14:00 Beijing) — publishes 3 articles per day, longest first
    - cron: "0 6 * * *"

permissions:
  contents: write          # so we can commit data/devto-published.jsonl after each run
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile --prod --ignore-scripts

      - name: Publish next batch
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          DEVTO_ORG_ID: ${{ secrets.DEVTO_ORG_ID }}
          NEXT_PUBLIC_SITE_URL: https://sienovo.jytech.us
        run: |
          # workflow_dispatch supplies inputs.* explicitly; cron-fired runs leave
          # them empty, so default to limit=3 / published.
          LIMIT="${{ github.event.inputs.limit }}"
          DRAFT="${{ github.event.inputs.draft }}"
          DRAFT_FLAG=""
          if [ "$DRAFT" = "true" ]; then DRAFT_FLAG="--draft"; fi
          node scripts/publish-devto.mjs --limit "${LIMIT:-3}" $DRAFT_FLAG

      # Run even if "Publish next batch" exited non-zero — partial successes
      # already wrote rows to data/devto-published.jsonl, and skipping the
      # commit lets dev.to and our state drift apart, leading to repeated
      # 422 "canonical url already taken" errors on subsequent runs.
      - name: Commit published-state log
        if: always()
        run: |
          if [ -n "$(git status --porcelain data/devto-published.jsonl)" ]; then
            git config user.name "sienovo-bot"
            git config user.email "bot@sienovo.jytech.us"
            git add data/devto-published.jsonl
            git commit -m "chore(devto): record published articles"
            git push
          else
            echo "Nothing new to record."
          fi
