name: Sync CSDN Blog

on:
  schedule:
    # Run daily at 2:00 AM UTC (10:00 AM CST)
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "pnpm"

      # No --prod: the scraper needs Playwright, which is a devDependency.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Cache the downloaded browser binaries (~150MB) keyed on the lock file,
      # so the Chromium download only runs when the playwright version changes.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      # The CDN download has stalled for a full hour before (the job's
      # timeout-minutes used to swallow it). Cap this step at 15 min and retry
      # so a flaky download fails fast and recovers instead of hanging the run.
      - name: Install Playwright browsers
        timeout-minutes: 15
        run: |
          for i in 1 2 3; do
            pnpm exec playwright install chromium --with-deps && break
            echo "playwright install attempt $i failed; retrying in 15s..."
            sleep 15
          done

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - name: Update article list
        run: xvfb-run --auto-servernum node scripts/update-article-list.mjs
        env:
          DISPLAY: ":99"

      - name: Fetch new articles
        run: xvfb-run --auto-servernum node scripts/fetch-csdn.mjs --resume
        env:
          DISPLAY: ":99"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Commit synced articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/ scripts/article-list.txt
          if git diff --staged --quiet; then
            echo "No new articles to commit."
          else
            COUNT=$(git diff --staged --name-only -- content/blog/ | wc -l | tr -d ' ')
            git commit -m "sync: fetch ${COUNT} new blog articles from CSDN"
            git push
          fi
