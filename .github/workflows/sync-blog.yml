name: Sync CSDN Blog

on:
  schedule:
    # Run daily at 2:00 AM UTC (10:00 AM CST)
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      # Step 1: Update article list (find new articles)
      - name: Update article list
        run: xvfb-run --auto-servernum node scripts/update-article-list.mjs
        env:
          DISPLAY: ":99"

      # Step 2: Fetch new articles with images → R2
      - name: Fetch new articles
        run: xvfb-run --auto-servernum node scripts/fetch-csdn.mjs --resume
        env:
          DISPLAY: ":99"
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      # Step 3: Translate articles to English
      # Priority: Gemini Direct (free) → Vercel AI Gateway (credits)
      # Automatically skips already-translated articles
      - name: Translate articles
        run: node scripts/translate-blog.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VERCEL_AI_GEWAY_API_KEY: ${{ secrets.VERCEL_AI_GEWAY_API_KEY }}

      # Step 4: Commit and push new content
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/ content/blog-en/ scripts/article-list.txt
          if git diff --staged --quiet; then
            echo "No new articles to commit."
          else
            COUNT=$(git diff --staged --name-only -- content/blog/ content/blog-en/ | wc -l | tr -d ' ')
            git commit -m "sync: add ${COUNT} new blog articles from CSDN"
            git push
          fi
