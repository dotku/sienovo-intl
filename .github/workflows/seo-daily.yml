name: SEO + Ads daily snapshot

# Snapshots GSC indexing/analytics + Google Ads campaign performance every
# day so we can track Google's crawler + paid traffic over time. Sparse data
# is fine — the point is the trend, not any single day's numbers.

on:
  schedule:
    - cron: "30 1 * * *"   # 01:30 UTC daily (09:30 Beijing) — after Google's
                            # daily processing window finishes (~midnight UTC)
  workflow_dispatch:

permissions:
  contents: write    # needed to commit data/seo-reports/ + content/blog-en/
  models: read       # grants GITHUB_TOKEN the models:read scope for GitHub Models

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Write service-account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/sa.json
          test -s /tmp/sa.json || { echo "::error::GCP_SA_KEY secret missing or empty"; exit 1; }

      - name: Pull search analytics + coverage
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          node scripts/gsc-pull.mjs
          node scripts/gsc-coverage.mjs

      - name: Generate analysis + trend
        run: |
          node scripts/seo-analyze.mjs
          node scripts/seo-trend.mjs

      - name: Pull Google Ads campaign performance
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
        run: node scripts/google-ads-pull.mjs || echo "ads-pull skipped (creds may not be configured yet)"
        continue-on-error: true

      # ── Content-generation pipeline ──────────────────────────────────────
      # Both scripts auto-select the best available provider from their chain
      # (claude > github-models > gateway > openrouter > gemini). In Actions
      # we always have GITHUB_TOKEN, often OPENROUTER_API_KEY too — claude
      # CLI is absent, so github-models wins unless it errors, in which case
      # we fall through to OpenRouter then Gemini Direct. Daily limits keep
      # us inside free-tier rate budgets and produce a steady commit cadence.

      - name: Expand thin posts (daily limit)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EXPAND_DELAY_MS: "8000"
        run: node scripts/expand-thin-posts.mjs --limit 30
        continue-on-error: true

      - name: Generate SEO title/description metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SEO_DELAY_MS: "6500"
        run: node scripts/gen-blog-seo.mjs --limit 80
        continue-on-error: true

      - name: Commit if there are new reports or content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seo-reports/ data/google-ads-reports/ content/blog-en/
          if git diff --staged --quiet; then
            echo "no changes — likely already snapshotted today"
          else
            git commit -m "chore(seo): daily snapshot + content updates $(date -u +%Y-%m-%d)"
            git push
          fi
